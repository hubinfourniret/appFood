version: "3.8"

# Docker Compose pour le developpement local
# Usage : docker compose up -d

services:
  postgres:
    image: postgres:16
    container_name: appfood-postgres
    environment:
      POSTGRES_DB: appfood
      POSTGRES_USER: appfood
      POSTGRES_PASSWORD: appfood
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appfood"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: appfood-meilisearch
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch-data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: appfood-backend
    ports:
      - "8080:8080"
    environment:
      APP_ENV: dev
      KTOR_DEVELOPMENT: "true"
      DATABASE_URL: "jdbc:postgresql://postgres:5432/appfood"
      DATABASE_USER: appfood
      DATABASE_PASSWORD: appfood
      MEILISEARCH_URL: "http://meilisearch:7700"
      MEILISEARCH_API_KEY: masterKey
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

volumes:
  postgres-data:
  meilisearch-data:
