ktor {
    deployment {
        port = 8080
    }
    application {
        modules = [ com.appfood.backend.ApplicationKt.module ]
    }
    development = true
}

appfood {
    environment = "test"

    database {
        url = "jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL"
        user = "sa"
        password = ""
    }

    meilisearch {
        url = "http://localhost:7700"
        apiKey = "test-key"
    }

    jwt {
        secret = "test-secret-for-integration-tests-only"
        issuer = "appfood-api"
        audience = "appfood-mobile"
        realm = "appfood"
    }

    cors {
        allowedHosts = []
    }
}
