ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.appfood.backend.ApplicationKt.module ]
    }
    // Surcharge par environnement via -config=application-{env}.conf
    development = true
    development = ${?KTOR_DEVELOPMENT}
}

appfood {
    environment = "dev"
    environment = ${?APP_ENV}

    database {
        url = "jdbc:postgresql://localhost:5432/appfood"
        url = ${?DATABASE_URL}
        user = "appfood"
        user = ${?DATABASE_USER}
        password = "appfood"
        password = ${?DATABASE_PASSWORD}
    }

    meilisearch {
        url = "http://localhost:7700"
        url = ${?MEILISEARCH_URL}
        apiKey = "masterKey"
        apiKey = ${?MEILISEARCH_API_KEY}
    }

    jwt {
        secret = "dev-secret-change-in-production"
        secret = ${?JWT_SECRET}
        issuer = "appfood-api"
        audience = "appfood-mobile"
        realm = "appfood"
    }

    cors {
        allowedHosts = []
    }
}
