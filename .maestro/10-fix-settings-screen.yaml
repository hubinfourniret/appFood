appId: com.appfood
name: "10 — Fix verif: ecran Parametres n'est plus vide"
env:
  TEST_EMAIL: "hubin.fourniret1@gmail.com"
  TEST_PASSWORD: "Password1234"
---
- launchApp:
    clearState: true
    stopApp: true
- waitForAnimationToEnd:
    timeout: 10000

- extendedWaitUntil:
    visible:
      text: "Adresse e-mail"
    timeout: 45000

- tapOn:
    text: "Adresse e-mail"
- inputText: "${TEST_EMAIL}"
- tapOn:
    text: "Mot de passe"
- inputText: "${TEST_PASSWORD}"
- hideKeyboard
- tapOn:
    text: "Se connecter"
    index: 1

- extendedWaitUntil:
    visible:
      text: "Profil"
    timeout: 60000

# Naviguer vers Profil
- tapOn:
    text: "Profil"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: "10-01-profil"

# Naviguer vers Parametres
- tapOn:
    text: "Parametres"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: "10-02-settings"

# Verifier que l'ecran contient les sections attendues
- assertVisible:
    text: "General"
- assertVisible:
    text: "Sante et suivi"
- assertVisible:
    text: "Informations legales"
- assertVisible:
    text: "A propos"
- assertVisible:
    text: "Questions frequentes"
- assertVisible:
    text: "Gestion des consentements"
- takeScreenshot: "10-03-settings-sections"

# Scroll pour voir la section Legal
- scroll
- assertVisible:
    text: "Politique de confidentialite"
- assertVisible:
    text: "Conditions generales d'utilisation"
- assertVisible:
    text: "Version de l'application"
- takeScreenshot: "10-04-settings-legal"

# Naviguer vers A propos depuis Parametres
- swipe:
    direction: "DOWN"
    duration: 400
- tapOn:
    text: "A propos"
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible:
    text: "appFood"
- takeScreenshot: "10-05-about-from-settings"

# Retour
- tapOn:
    text: "Retour"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: "10-06-back-to-settings"
