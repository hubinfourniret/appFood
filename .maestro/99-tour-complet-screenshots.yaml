appId: com.appfood
name: "99 — Tour complet : screenshot de chaque ecran principal"
env:
  TEST_EMAIL: "hubin.fourniret@gmail.com"
  TEST_PASSWORD: "CHANGEME"
---
- launchApp:
    clearState: false

- runFlow:
    when:
      visible:
        text: "Se connecter"
    commands:
      - tapOn:
          text: "Adresse e-mail"
      - inputText: "${TEST_EMAIL}"
      - tapOn:
          text: "Mot de passe"
      - inputText: "${TEST_PASSWORD}"
      - tapOn:
          text: "Se connecter"
          index: 1
      - waitForAnimationToEnd:
          timeout: 5000

- runFlow:
    when:
      visible: "J'ai lu et j'accepte"
    commands:
      - tapOn: "J'ai lu et j'accepte"
      - waitForAnimationToEnd

# Dashboard
- takeScreenshot: "99-01-dashboard"
- scroll
- takeScreenshot: "99-02-dashboard-bas"

# Onglet Ajouter
- tapOn:
    text: "Ajouter"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "99-03-ajouter"

# Retour
- back

# Onglet Recettes
- tapOn:
    text: "Recettes"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: "99-04-recettes"
- scroll
- takeScreenshot: "99-05-recettes-bas"

# Onglet Profil
