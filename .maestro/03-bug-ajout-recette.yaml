appId: com.appfood
name: "03 — Bug : bouton 'Ajouter au journal' sur detail recette"
env:
  TEST_EMAIL: "hubin.fourniret1@gmail.com"
  TEST_PASSWORD: "Password1234"
---
- launchApp:
    clearState: true
    stopApp: true
- waitForAnimationToEnd:
    timeout: 10000

- extendedWaitUntil:
    visible:
      text: "Adresse e-mail"
    timeout: 45000

- tapOn:
    text: "Adresse e-mail"
- inputText: "${TEST_EMAIL}"
- tapOn:
    text: "Mot de passe"
- inputText: "${TEST_PASSWORD}"
- hideKeyboard
- tapOn:
    text: "Se connecter"
    index: 1

- extendedWaitUntil:
    visible:
      text: "Recettes"
    timeout: 60000

- tapOn:
    text: "Recettes"
- extendedWaitUntil:
    visible:
      text: "Pudding de chia mangue"
    timeout: 10000
- takeScreenshot: "03-01-liste-recettes"

# Tap sur la 1ere recette
- tapOn:
    text: "Pudding de chia mangue"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: "03-02-detail-recette"

# Scroll pour voir tous les boutons
- scroll
- takeScreenshot: "03-03-detail-bas"

# Chercher et cliquer sur "Ajouter a mon journal"
- tapOn:
    text: "Ajouter a mon journal"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: "03-04-apres-clic-ajouter"

- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: "03-05-final"

# Si un dialog de selection repas apparait, screenshot
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: "03-06-dialog-repas"
